apiVersion: v1
kind: Namespace
metadata:
  name: mlops
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-data
  namespace: mlops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: python:3.11-slim
          command:
            - sh
            - -c
            - >
              pip install --no-cache-dir mlflow &&
              mlflow server
              --backend-store-uri sqlite:////shared/mlflow.db
              --default-artifact-root /shared/mlruns
              --host 0.0.0.0
              --port 5000
              --allowed-hosts '*'
              --cors-allowed-origins '*'
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: shared-storage
              mountPath: /shared
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: shared-data
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlops
spec:
  selector:
    app: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30500
  type: NodePort
---
apiVersion: batch/v1
kind: Job
metadata:
  name: training
  namespace: mlops
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: training
    spec:
      restartPolicy: Never
      containers:
        - name: training
          image: gsc-mlops:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000
          command:
            - sh
            - -c
            - >
              set -e;
              dvc repro;
              mkdir -p /shared/models;
              cp -f /app/models/model.pkl /shared/models/model.pkl;
              cp -f /app/models/columns.pkl /shared/models/columns.pkl;
              echo "Training complete and artifacts copied to shared volume.";
          volumeMounts:
            - name: shared-storage
              mountPath: /shared
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: shared-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-for-models
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              until [ -f /shared/models/model.pkl ] && [ -f /shared/models/columns.pkl ]; do
                echo "Waiting for trained model artifacts in /shared/models...";
                sleep 5;
              done
          volumeMounts:
            - name: shared-storage
              mountPath: /shared
      containers:
        - name: api
          image: gsc-mlops:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000
          command:
            - sh
            - -c
            - >
              set -e;
              mkdir -p /app/models;
              cp -f /shared/models/model.pkl /app/models/model.pkl;
              cp -f /shared/models/columns.pkl /app/models/columns.pkl;
              uvicorn main:app --host 0.0.0.0 --port 8000
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: shared-storage
              mountPath: /shared
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: shared-data
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: mlops
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
  type: NodePort
